<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Create Account - Finance Flow</title>
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>
<div class="topbar">
  <a href="../index.html" class="tb-logo"><div class="tb-logo-icon">&#9889;</div><div class="tb-logo-text">Finance<span>Flow</span></div></a>
  <div style="font-size:14px;color:var(--text-muted);">Already have an account? <a href="signin.html" style="color:var(--accent);font-weight:700;text-decoration:none;">Sign in &#8594;</a></div>
</div>

<div class="auth-wrap" style="align-items:flex-start;padding-top:48px;">
  <div class="auth-card" style="max-width:760px;">
    <div id="s1">
      <div class="auth-title">Create your account</div>
      <div class="auth-sub">One-step signup (no OTP)</div>
      <div class="form-row">
        <div class="fw"><label class="flbl">Full Name</label><input class="finput" id="sname" placeholder="Rahul Sharma" autocomplete="name"></div>
        <div class="fw"><label class="flbl">Email Address</label><input class="finput" type="email" id="semail" placeholder="you@example.com" autocomplete="email"></div>
      </div>
      <div class="form-row">
        <div class="fw"><label class="flbl">Mobile Number</label><input class="finput" type="tel" id="smobile" placeholder="+91 98765 43210" autocomplete="tel"></div>
        <div class="fw"><label class="flbl">Password</label><input class="finput" type="password" id="spass" placeholder="Min. 6 characters" autocomplete="new-password"></div>
      </div>
      <div class="form-row">
        <div class="fw"><label class="flbl">Confirm Password</label><input class="finput" type="password" id="spass2" placeholder="Repeat password" autocomplete="new-password"></div>
        <div class="fw"></div>
      </div>
      <button class="btn btn-p btn-full" onclick="doSignup()">Create Account &#8594;</button>
      <button class="btn btn-s btn-full" style="margin-top:12px;" onclick="restoreBackup()">Restore Backup (.json)</button>
      <div class="divider"><div class="div-line"></div><span class="div-txt">or sign up with</span><div class="div-line"></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <button class="btn-social" onclick="socialSignup('Apple')">&#127822; Apple</button>
        <button class="btn-social" onclick="socialSignup('Google')">&#128309; Google</button>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="ff-toast"></div>

<script src="../js/app.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const emailParam = urlParams.get('email');
const decodedEmail = emailParam ? decodeURIComponent(emailParam) : '';
const current = FF.getUser();

if (decodedEmail) {
  document.getElementById('semail').value = decodedEmail;

  const curEmail = String(current?.email || '').trim().toLowerCase();
  const wanted = String(decodedEmail || '').trim().toLowerCase();
  if (curEmail && wanted && curEmail !== wanted) {
    // Switch accounts cleanly.
    FF.logout();
  } else if (curEmail && curEmail === wanted) {
    location.href = 'dashboard.html';
  }
} else if (FF.isLoggedIn()) {
  location.href = 'dashboard.html';
}

function restoreBackup() {
  const pass = document.getElementById('spass').value;
  const pass2 = document.getElementById('spass2').value;

  if (!pass || pass.length < 6) return toast('⚠️ Password needs at least 6 characters.');
  if (pass !== pass2) return toast('⚠️ Passwords do not match.');

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = (ev) => {
    const file = ev.target.files?.[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async (rev) => {
      try {
        const parsed = JSON.parse(String(rev.target?.result || ''));
        const safe = FF.ensureDataShape(parsed);
        const backupEmail = String(safe?.email || '').trim();

        if (!backupEmail || !backupEmail.includes('@')) {
          toast('⚠️ Backup is missing a valid email');
          return;
        }

        if (FF.checkAccount(backupEmail)) {
          toast('Account already exists. Please sign in.');
          setTimeout(() => location.href = 'signin.html?email=' + encodeURIComponent(backupEmail), 900);
          return;
        }

        const email = backupEmail.toLowerCase();
        const derived = (() => {
          const n = (email.split('@')[0] || '').trim();
          return n ? n.charAt(0).toUpperCase() + n.slice(1) : 'User';
        })();
        const name = String(safe?.name || '').trim() || derived;

        // Update form so user can see what got restored
        document.getElementById('sname').value = name;
        document.getElementById('semail').value = backupEmail;

        safe.email = backupEmail;
        localStorage.setItem(`ff_data_${email}`, JSON.stringify(safe));
        await FF.setPassword(email, pass);

        FF.login(name, email);
        toast('✅ Backup restored!');
        setTimeout(() => location.href = 'dashboard.html', 700);
      } catch (_err) {
        toast('⚠️ Invalid backup file');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

async function doSignup() {
  const n = document.getElementById('sname').value.trim();
  const e = document.getElementById('semail').value.trim();
  const p = document.getElementById('spass').value;
  const p2 = document.getElementById('spass2').value;
  const m = document.getElementById('smobile').value || '';

  if (!n) return toast('Enter your name.');
  if (!e || !e.includes('@')) return toast('Enter a valid email.');
  if (p.length < 6) return toast('Password needs at least 6 characters.');
  if (p !== p2) return toast('Passwords do not match.');

  if (FF.checkAccount(e)) {
    toast('Account already exists. Please sign in.');
    setTimeout(() => location.href = 'signin.html?email=' + encodeURIComponent(e), 900);
    return;
  }

  // Cloud Sync (Firebase) — if configured, create the account in the cloud first.
  const cloudReady = await FF.cloud?.init?.().catch(() => false);
  if (cloudReady) {
    try {
      const candidate = FF.freshData(n, e, 0);
      if (m) candidate.mobile = m;
      await FF.cloud.signUp(n, e, p, candidate);

      // Store password hash locally (client-side) for offline fallback.
      await FF.setPassword(e, p);

      toast('Welcome to Finance Flow, ' + n + '!');
      setTimeout(() => location.href = 'dashboard.html', 800);
      return;
    } catch (err) {
      const code = String(err?.code || err?.message || '').toLowerCase();
      if (code.includes('email-already-in-use')) {
        toast('Account already exists. Please sign in.');
        setTimeout(() => location.href = 'signin.html?email=' + encodeURIComponent(e), 900);
        return;
      }
      // If cloud signup fails for any reason, fall back to local-only.
    }
  }

  try {
    FF.signup(n, e, 0);
  } catch (err) {
    toast(err?.message || 'Unable to create account.');
    return;
  }

  const d = FF.data;
  if (d && m) {
    d.mobile = m;
    FF.save(d);
  }

  // Store password hash locally (simple client-side protection)
  await FF.setPassword(e, p);

  toast('Welcome to Finance Flow, ' + n + '!');
  setTimeout(() => location.href = 'dashboard.html', 800);
}

function socialSignup(provider) {
  const n = document.getElementById('sname').value.trim() || 'New User';
  const e = document.getElementById('semail').value.trim() || `user.${provider.toLowerCase()}@financeflow.app`;

  if (FF.checkAccount(e)) {
    toast('Account already exists. Please sign in.');
    setTimeout(() => location.href = 'signin.html?email=' + encodeURIComponent(e), 900);
    return;
  }

  try {
    FF.signup(n, e, 0);
  } catch (err) {
    toast(err?.message || 'Unable to create account.');
    return;
  }
  toast('Welcome back via ' + provider + '!');
  setTimeout(() => location.href = 'dashboard.html', 800);
}
</script>
</body>
</html>
