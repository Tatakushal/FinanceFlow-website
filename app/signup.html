<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Create Account - Finance Flow</title>
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>
<div class="topbar">
  <a href="../index.html" class="tb-logo"><div class="tb-logo-icon">&#9889;</div><div class="tb-logo-text">Finance<span>Flow</span></div></a>
  <div style="font-size:14px;color:var(--text-muted);">Already have an account? <a href="signin.html" style="color:var(--accent);font-weight:700;text-decoration:none;">Sign in &#8594;</a></div>
</div>

<div class="auth-wrap" style="align-items:flex-start;padding-top:48px;">
  <div class="auth-card" style="max-width:760px;">
    <div class="step-dots"><div class="sdot on" id="d1"></div><div class="sdot" id="d2"></div></div>

    <div id="s1">
      <div class="auth-title">Create your account</div>
      <div class="auth-sub">Step 1 of 2: Basic details</div>
      <div class="form-row">
        <div class="fw"><label class="flbl">Full Name</label><input class="finput" id="sname" placeholder="Rahul Sharma" autocomplete="name"></div>
        <div class="fw"><label class="flbl">Email Address</label><input class="finput" type="email" id="semail" placeholder="you@example.com" autocomplete="email"></div>
      </div>
      <div class="form-row">
        <div class="fw"><label class="flbl">Mobile Number</label><input class="finput" type="tel" id="smobile" placeholder="+91 98765 43210" autocomplete="tel"></div>
        <div class="fw"><label class="flbl">Password</label><input class="finput" type="password" id="spass" placeholder="Min. 6 characters" autocomplete="new-password"></div>
      </div>
      <div class="form-row">
        <div class="fw"><label class="flbl">Confirm Password</label><input class="finput" type="password" id="spass2" placeholder="Repeat password" autocomplete="new-password"></div>
        <div class="fw"></div>
      </div>
      <button class="btn btn-p btn-full" onclick="goStep2()">Continue - Step 2 of 2</button>
      <div class="divider"><div class="div-line"></div><span class="div-txt">or sign up with</span><div class="div-line"></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <button class="btn-social" onclick="socialSignup('Apple')">&#127822; Apple</button>
        <button class="btn-social" onclick="socialSignup('Google')">&#128309; Google</button>
      </div>
    </div>

    <div id="s2" style="display:none;text-align:center;">
      <div style="font-size:56px;margin-bottom:16px;">&#128241;</div>
      <div class="auth-title">Verify your number</div>
      <div style="font-size:15px;color:var(--text-muted);margin-bottom:8px;">We sent a 4-digit code to</div>
      <div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:28px;" id="otp-ph">+91 XXXXX XXXXX</div>
      <div class="otp-row">
        <input class="otp-in" maxlength="1" id="o1" oninput="onOtp(this,'o2')">
        <input class="otp-in" maxlength="1" id="o2" oninput="onOtp(this,'o3')">
        <input class="otp-in" maxlength="1" id="o3" oninput="onOtp(this,'o4')">
        <input class="otp-in" maxlength="1" id="o4">
      </div>
      <button class="btn btn-p btn-full" onclick="doSignup()" style="margin-bottom:14px;">Verify & Create Account</button>
      <div style="font-size:14px;color:var(--text-muted);">Didn't receive it? <span style="color:var(--accent);cursor:pointer;font-weight:700;" onclick="toast('New code sent!')">Resend code</span></div>
      <button onclick="showStep(1)" style="margin-top:18px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;font-family:var(--fb);">&#8592; Go back</button>
    </div>

  </div>
</div>
<div class="toast" id="ff-toast"></div>

<script src="../js/app.js"></script>
<script>
if (FF.isLoggedIn()) location.href = 'dashboard.html';
const urlParams = new URLSearchParams(window.location.search);
const emailParam = urlParams.get('email');
if (emailParam) document.getElementById('semail').value = decodeURIComponent(emailParam);

function showStep(step) {
  document.getElementById('s1').style.display = step === 1 ? 'block' : 'none';
  document.getElementById('s2').style.display = step === 2 ? 'block' : 'none';
  document.getElementById('d1').classList.toggle('on', step === 1);
  document.getElementById('d2').classList.toggle('on', step === 2);
}

function goStep2() {
  const n = document.getElementById('sname').value.trim();
  const e = document.getElementById('semail').value.trim();
  const p = document.getElementById('spass').value;
  const p2 = document.getElementById('spass2').value;
  if (!n) return toast('Enter your name.');
  if (!e || !e.includes('@')) return toast('Enter a valid email.');
  if (p.length < 6) return toast('Password needs at least 6 characters.');
  if (p !== p2) return toast('Passwords do not match.');
  const m = document.getElementById('smobile').value || '';
  document.getElementById('otp-ph').textContent = m || e;
  showStep(2);
  document.getElementById('o1').focus();
}

function onOtp(el, next) { if (el.value.length === 1) document.getElementById(next)?.focus(); }

function doSignup() {
  const n = document.getElementById('sname').value.trim();
  const e = document.getElementById('semail').value.trim();
  
  FF.signup(n, e, 0);
  toast('Welcome to Finance Flow, ' + n + '!');
  setTimeout(() => location.href = 'dashboard.html', 800);
}

function socialSignup(provider) {
  const n = document.getElementById('sname').value.trim() || 'New User';
  const e = document.getElementById('semail').value.trim() || `user.${provider.toLowerCase()}@financeflow.app`;
  FF.signup(n, e, 0);
  toast('Welcome back via ' + provider + '!');
  setTimeout(() => location.href = 'dashboard.html', 800);
}
</script>
</body>
</html>
