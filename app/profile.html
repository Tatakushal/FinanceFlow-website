<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Profile — Finance Flow</title><link rel="stylesheet" href="../css/app.css"></head>
<body>
<div class="topbar">
  <a href="../index.html" class="tb-logo"><div class="tb-logo-icon">⚡</div><div class="tb-logo-text">Finance<span>Flow</span></div></a>
  <div class="tb-right"><a href="edit-profile.html" class="btn-tb-primary">✏️ Edit Profile</a></div>
</div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content page-in">
    <div class="grid-2" style="gap:28px;">
      <!-- Profile card -->
      <div>
        <div class="card" style="text-align:center;margin-bottom:20px;">
          <div style="width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--primary));margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 0 0 4px rgba(0,229,160,0.15);">😊</div>
          <div style="font-family:var(--fd);font-size:24px;font-weight:800;color:#fff;margin-bottom:4px;" id="p-name">—</div>
          <div style="font-size:14px;color:var(--text-muted);margin-bottom:12px;" id="p-email">—</div>
          <span class="tag-green">✓ Verified Member</span>
        </div>
        <div class="grid-2" style="gap:12px;margin-bottom:20px;">
          <div class="card-sm" style="text-align:center;"><div style="font-family:var(--fd);font-size:24px;font-weight:800;color:var(--primary);" id="ps-txs">0</div><div style="font-size:12px;color:var(--text-muted);">Transactions</div></div>
          <div class="card-sm" style="text-align:center;"><div style="font-family:var(--fd);font-size:24px;font-weight:800;color:var(--warn);" id="ps-goals">0</div><div style="font-size:12px;color:var(--text-muted);">Goals</div></div>
          <div class="card-sm" style="text-align:center;"><div style="font-family:var(--fd);font-size:24px;font-weight:800;color:var(--accent);" id="ps-budgets">6</div><div style="font-size:12px;color:var(--text-muted);">Budgets</div></div>
          <div class="card-sm" style="text-align:center;"><div style="font-family:var(--fd);font-size:24px;font-weight:800;color:var(--gold);" id="ps-score">—</div><div style="font-size:12px;color:var(--text-muted);">Health Score</div></div>
        </div>
      </div>
      <!-- Quick links -->
      <div>
        <div class="menu-section">
          <div class="menu-section-title">Account</div>
          <a href="edit-profile.html" class="menu-row"><div class="menu-ico" style="background:var(--accent-dim);">✏️</div><div class="menu-info"><div class="menu-lbl">Edit Profile</div><div class="menu-sub">Name, mobile, income target</div></div><span class="menu-chev">›</span></a>
          <a href="goals.html" class="menu-row"><div class="menu-ico" style="background:var(--primary-dim);">🎯</div><div class="menu-info"><div class="menu-lbl">Financial Goals</div><div class="menu-sub" id="goal-count">0 active goals</div></div><span class="menu-chev">›</span></a>
          <a href="health-score.html" class="menu-row"><div class="menu-ico" style="background:rgba(255,184,0,.12);">💯</div><div class="menu-info"><div class="menu-lbl">Health Score</div><div class="menu-sub">Your financial fitness</div></div><span class="menu-chev">›</span></a>
        </div>
        <div class="menu-section">
          <div class="menu-section-title">Preferences</div>
          <a href="notifications.html" class="menu-row"><div class="menu-ico" style="background:rgba(255,184,0,.12);">🔔</div><div class="menu-info"><div class="menu-lbl">Notifications</div></div><span class="menu-chev">›</span></a>
          <a href="security.html" class="menu-row"><div class="menu-ico" style="background:var(--purple-dim);">🔒</div><div class="menu-info"><div class="menu-lbl">Security</div></div><span class="menu-chev">›</span></a>
          <a href="appearance.html" class="menu-row"><div class="menu-ico" style="background:rgba(0,180,216,.1);">🎨</div><div class="menu-info"><div class="menu-lbl">Appearance</div></div><span class="menu-chev">›</span></a>
        </div>
        <div class="menu-section">
          <div class="menu-row" onclick="FF.logout();location.href='../index.html'" style="background:var(--warn-dim);">
            <div class="menu-ico">🚪</div><div class="menu-info"><div class="menu-lbl" style="color:var(--warn);">Log Out</div></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
<script>
if (!FF.isLoggedIn()) location.href = 'signin.html';
FF.initializeAppearance();
buildSidebar('profile');
const u = FF.getUser(), d = FF.data, t = FF.getTotals();
document.getElementById('p-name').textContent = u?.name || d.name;
document.getElementById('p-email').textContent = u?.email || d.email;
document.getElementById('ps-txs').textContent = d.txs.length;
document.getElementById('ps-goals').textContent = d.goals.length;
document.getElementById('goal-count').textContent = d.goals.length + ' active goal' + (d.goals.length!==1?'s':'');
const score = t.income > 0 ? Math.min(99, Math.round(50 + parseFloat(t.rate) * 0.5)) : null;
document.getElementById('ps-score').textContent = score || '—';
</script>
</body></html>
