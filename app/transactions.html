<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Transactions - Finance Flow</title>
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>
<div class="topbar">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <a href="../index.html" class="tb-logo"><div class="tb-logo-icon">&#9889;</div><div class="tb-logo-text">Finance<span>Flow</span></div></a>
  <div class="tb-right"><a href="add-expense.html" class="btn-tb-primary">+ Add Transaction</a></div>
</div>
<div class="app-layout">
  <main class="main-content page-in">
    <div class="page-header">
      <div class="page-title">Transactions</div>
      <div class="page-sub">All your income and expenses in one place</div>
    </div>

    <div class="tx-toolbar">
      <input class="finput" id="search" placeholder="Search by name or category..." oninput="render()">
      <div class="chip-row" style="margin-bottom:0;gap:8px;">
        <div class="chip on" onclick="filt('all',this)">All</div>
        <div class="chip" onclick="filt('expense',this)">Expenses</div>
        <div class="chip" onclick="filt('income',this)">Income</div>
      </div>
    </div>

    <div class="card" id="tx-table" style="padding:0;overflow:hidden;"></div>
  </main>
</div>

<script src="../js/app.js"></script>
<script>
if (!FF.isLoggedIn()) location.href = "signin.html";
FF.initializeAppearance();
buildSidebar("tx");

let f = "all";

function filt(v, el) {
  f = v;
  document.querySelectorAll(".chip-row .chip").forEach((c) => c.classList.remove("on"));
  el.classList.add("on");
  render();
}

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const d = FF.data;
  let txs = Array.isArray(d.txs) ? d.txs.slice() : [];

  if (f === "expense") txs = txs.filter((t) => t.type === "expense");
  if (f === "income") txs = txs.filter((t) => t.type === "income");
  if (q) txs = txs.filter((t) => String(t.name || "").toLowerCase().includes(q) || String(t.cat || "").toLowerCase().includes(q));

  const el = document.getElementById("tx-table");
  if (!txs.length) {
    el.innerHTML = '<div style="text-align:center;padding:64px 20px;color:var(--text-muted);font-size:15px;">No transactions found.<br><a href="add-expense.html" style="color:var(--accent);font-weight:600;text-decoration:none;">Add your first one -&gt;</a></div>';
    return;
  }

  const groups = {};
  txs.forEach((t) => {
    const dateKey = t.date || "Unknown";
    if (!groups[dateKey]) groups[dateKey] = [];
    groups[dateKey].push(t);
  });

  el.innerHTML = `<div class="table-scroll"><table class="data-table" style="width:100%;">
    <thead><tr><th>Transaction</th><th>Category</th><th>Date</th><th>Payment</th><th style="text-align:right;">Amount</th></tr></thead>
    <tbody>${Object.entries(groups).map(([date, items]) =>
      items.map((t) => `<tr>
        <td><div style="display:flex;align-items:center;gap:12px;"><div style="width:38px;height:38px;border-radius:10px;background:${t.clr}20;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">${t.ico}</div><div><div style="font-weight:600;color:#fff;">${t.name}</div></div></div></td>
        <td><span class="tag-${t.type === "income" ? "green" : "warn"}">${t.cat}</span></td>
        <td style="color:var(--text-muted);">${date}</td>
        <td style="color:var(--text-muted);">${t.pay || "-"}</td>
        <td style="text-align:right;font-family:var(--fd);font-size:15px;font-weight:800;color:${t.type === "income" ? "var(--primary)" : "var(--warn)"};">${t.type === "income" ? "+" : "-"}${FF.fmt(t.amt)}</td>
      </tr>`).join("")
    ).join("")}</tbody></table></div>`;
}

render();
</script>
</body>
</html>
