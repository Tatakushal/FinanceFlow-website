<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>FlowAI - Finance Flow</title>
  <link rel="stylesheet" href="../css/app.css">
  <style>
    .chat-send:disabled,
    .chat-in:disabled {
      opacity: .5;
      cursor: not-allowed
    }
  </style>
</head>

<body>
  <div class="topbar">
    <a href="../index.html" class="tb-logo">
      <div class="tb-logo-icon">&#9889;</div>
      <div class="tb-logo-text">Finance<span>Flow</span></div>
  </a>
    <div class="tb-right">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="font-size:12px;color:var(--primary);font-weight:800;">FlowAI</div>
        <span class="tag-warn" style="padding:4px 10px;font-size:11px;">In Training</span>
      </div>
    </div>
  </div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content page-in ai-main">
      <div class="chip-row" style="margin-bottom:16px;">
        <div class="chip" onclick="qp('How am I doing this month?')">This month</div>
        <div class="chip" onclick="qp('Where am I overspending?')">Overspending</div>
        <div class="chip" onclick="qp('Which subscriptions should I cancel?')">Subscriptions</div>
        <div class="chip" onclick="qp('Give me a weekly saving plan')">Weekly plan</div>
        <div class="chip" onclick="qp('Am I on track with my goals?')">Goal check</div>
      </div>

      <div class="chat-layout ai-chat-layout">
        <div class="chat-box ai-chat-box">
          <div class="chat-area" id="chat-area">
            <div class="msg-ai">
              <div class="ai-avatar">AI</div>
              <div class="bubble-ai" id="welcome-msg">FlowAI is in training — answers may be incomplete. Ask me anything about your finances!</div>
            </div>
          </div>
          <div class="chat-input-row">
            <input class="chat-in" id="cin" placeholder="Ask FlowAI anything..."
              onkeydown="if(event.key==='Enter')send()">
            <button class="chat-send" id="send-btn" onclick="send()">Go</button>
          </div>
        </div>


          <div class="card-sm">
            <div style="font-family:var(--fd);font-size:13px;font-weight:800;color:#fff;margin-bottom:10px;">Snapshot
            </div>
            <div id="snapshot"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="ff-toast"></div>



  <script src="../js/app.js"></script>
  <script>
    if (!FF.isLoggedIn()) location.href = "signin.html";
    FF.initializeAppearance();
    buildSidebar("ai");

    let busy = false;
    const chatHistory = [];

    function data() { return FF.data || {}; }
    function totals() { return FF.getTotals(); }
    function q() { return data().aiQuestionnaire || null; }
    function n(v) { const x = Number(v); return Number.isFinite(x) && x >= 0 ? x : 0; }
    function s(v) { return String(v || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

    function remember(role, content) {
      const text = String(content || "").trim();
      if (!text) return;
      chatHistory.push({ role, content: text.slice(0, 800) });
      if (chatHistory.length > 12) chatHistory.splice(0, chatHistory.length - 12);
    }

    function historyForRequest(message) {
      if (!chatHistory.length) return [];
      const last = chatHistory[chatHistory.length - 1];
      const normalizedMessage = String(message || "").trim();
      if (last?.role === "user" && String(last?.content || "").trim() === normalizedMessage) {
        return chatHistory.slice(0, -1);
      }
      return chatHistory.slice();
    }

    const SEG = { student: "Student", working_professional: "Working Professional", freelancer: "Freelancer", business_owner: "Business Owner", other: "Other" };
    const GOAL = { save_more: "Save more", control_spending: "Control spending", clear_debt: "Clear debt", invest_safely: "Invest safely", education_planning: "Education planning" };



    function renderSnapshot() {
      const d = data();
      const t = totals();
      const qq = q();
      const subs = Array.isArray(d.subscriptions) ? d.subscriptions : [];
      const monthlySubs = subs
        .filter((x) => String(x?.status || "active") !== "inactive")
        .reduce((sum, x) => {
          const amount = Number(x?.amount || 0) || 0;
          const cycle = String(x?.cycle || "monthly").toLowerCase();
          if (cycle === "yearly") return sum + (amount / 12);
          if (cycle === "quarterly") return sum + (amount / 3);
          if (cycle === "weekly") return sum + ((amount * 52) / 12);
          return sum + amount;
        }, 0);
      document.getElementById("snapshot").innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${qq ? `<div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);">Profile</span><span style="color:#fff;font-weight:700;">${s(SEG[qq.segment] || "User")}</span></div>` : ""}
      ${qq ? `<div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);">Goal</span><span style="color:#fff;font-weight:700;">${s(GOAL[qq.primaryGoal] || "General")}</span></div>` : ""}
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);">Income</span><span style="color:var(--primary);font-weight:700;">${FF.fmt(t.income)}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);">Spent</span><span style="color:var(--warn);font-weight:700;">${FF.fmt(t.spent)}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);">Saved</span><span style="color:var(--accent);font-weight:700;">${FF.fmt(t.saved)}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);"><span style="color:var(--text-muted);">Subscriptions</span><span style="color:#fff;font-weight:700;">${FF.fmt(monthlySubs)}/mo</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;"><span style="color:var(--text-muted);">Savings rate</span><span style="color:#fff;font-weight:700;">${s(t.rate)}%</span></div>
    </div>`;
    }



    function renderAll() {
      renderSnapshot();
    }



    function qp(m) {
      document.getElementById("cin").value = m;
      send();
    }

    function add(type, html) {
      const area = document.getElementById("chat-area");
      const d = document.createElement("div");
      d.className = type;
      d.innerHTML = html;
      area.appendChild(d);
      area.scrollTop = area.scrollHeight;
    }

    function addU(m) { add("msg-user", `<div class="bubble-user">${s(m)}</div>`); }
    function addAI(m) { add("msg-ai", `<div class="ai-avatar">AI</div><div class="bubble-ai">${m}</div>`); }
    function typing(on) { if (on) add("msg-ai", '<div class="ai-avatar">AI</div><div class="bubble-ai" id="typ"><div class="typing-dots"><span></span><span></span><span></span></div></div>'); else document.getElementById("typ")?.parentElement?.remove(); }

    function send() {
      const inp = document.getElementById("cin");
      const m = inp.value.trim();
      if (!m || busy) return;
      inp.value = "";
      addU(m);
      remember("user", m);
      getR(m);
    }

    function formatMoneyInline(value) {
      const n = Number(value || 0);
      const r = Math.round(n * 100) / 100;
      return FF.fmt(r);
    }

    function subscriptionMonthlyCost(sub) {
      const amount = Number(sub?.amount || 0) || 0;
      const cycle = String(sub?.cycle || "monthly").toLowerCase();
      if (cycle === "yearly") return amount / 12;
      if (cycle === "quarterly") return amount / 3;
      if (cycle === "weekly") return (amount * 52) / 12;
      return amount;
    }

    function clientFinanceFallback(message, d, t, qq) {
      const m = String(message || "").toLowerCase();
      const dense = m.replace(/[^a-z0-9]/g, "");
      const has = (...words) => words.some((w) => {
        const low = String(w || "").toLowerCase();
        const lowDense = low.replace(/[^a-z0-9]/g, "");
        return (low && m.includes(low)) || (lowDense && dense.includes(lowDense));
      });
      const greeting = /(^|\s)(hi|hello|hey)\b/.test(m.trim());
      const conceptIntent = /(^|\s)(what is|what's|whats|define|meaning of|explain|how does|how do)\b/.test(m);
      const marketCompareIntent = (
        has("stock", "stocks", "share market", "equity")
        && has("property", "properties", "real estate", "realestate", "house", "home")
        && has("which", "better", "profitable", "profit", "returns", "vs", "versus", "or")
      );
      const investmentAdviceIntent = (
        has("stock", "stocks", "mutual", "fund", "invest", "portfolio", "share", "buy")
        && has("what", "how", "best", "should", "starter", "starters", "beginner", "suggest", "recommend", "start", "where")
        && !marketCompareIntent
        && !conceptIntent
      );
      const userName = (d?.name || FF.getUser()?.name || "there").trim();
      const wealth = d.wealth || { assets: [], liabilities: [] };
      const totalAssets = (wealth.assets || []).reduce((sum, a) => sum + (Number(a?.value) || 0), 0);
      const totalLiabilities = (wealth.liabilities || []).reduce((sum, l) => {
        const left = Number(l?.outstandingAmount ?? l?.amount ?? 0) || 0;
        return sum + left;
      }, 0);
      const totalLoanPaid = (wealth.liabilities || []).reduce((sum, l) => {
        const paid = Number(l?.paidAmount ?? 0);
        if (Number.isFinite(paid) && paid > 0) return sum + paid;
        const original = Number(l?.originalAmount ?? 0) || 0;
        const left = Number(l?.outstandingAmount ?? l?.amount ?? 0) || 0;
        return sum + Math.max(original - left, 0);
      }, 0);
      const netWorth = totalAssets - totalLiabilities;
      const subscriptions = Array.isArray(d.subscriptions)
        ? d.subscriptions
          .map((raw) => ({
            name: String(raw?.name || "Subscription"),
            category: String(raw?.category || "Other"),
            amount: Number(raw?.amount || 0) || 0,
            cycle: String(raw?.cycle || "monthly").toLowerCase(),
            monthly: subscriptionMonthlyCost(raw),
            nextBillingDate: String(raw?.nextBillingDate || ""),
            autoRenew: raw?.autoRenew !== false,
            status: String(raw?.status || "active")
          }))
          .filter((s) => s.status !== "inactive" && s.amount > 0)
        : [];
      const monthlySubs = subscriptions.reduce((sum, s0) => sum + s0.monthly, 0);
      const topSubs = [...subscriptions].sort((a, b) => b.monthly - a.monthly).slice(0, 3);
      const nextSubDue = [...subscriptions]
        .map((s0) => ({ ...s0, ts: s0.nextBillingDate ? new Date(s0.nextBillingDate).getTime() : NaN }))
        .filter((s0) => Number.isFinite(s0.ts))
        .sort((a, b) => a.ts - b.ts)[0];

      const topLoan = [...(wealth.liabilities || [])]
        .map((l) => ({
          name: l?.name || "Loan",
          left: Number(l?.outstandingAmount ?? l?.amount ?? 0) || 0,
          paid: Number(l?.paidAmount ?? 0) || Math.max((Number(l?.originalAmount ?? 0) || 0) - (Number(l?.outstandingAmount ?? l?.amount ?? 0) || 0), 0),
          linked: l?.linkedTo || "",
          lender: l?.lender || "",
          rate: Number(l?.rate ?? 0) || 0
        }))
        .sort((a, b) => b.left - a.left)[0];

      const over = Array.isArray(d.budgets)
        ? d.budgets
          .filter((b) => Number(b?.lim || 0) > 0 && Number(b?.spent || 0) > Number(b?.lim || 0))
          .map((b) => ({
            cat: String(b?.cat || "Other"),
            overBy: (Number(b?.spent || 0) - Number(b?.lim || 0))
          }))
          .sort((a, b) => b.overBy - a.overBy)
        : [];
      const topBudget = Array.isArray(d.budgets) ? [...d.budgets].sort((a, b) => Number(b?.spent || 0) - Number(a?.spent || 0))[0] : null;
      const firstGoal = Array.isArray(d.goals) ? d.goals[0] : null;
      const goalTarget = Number(firstGoal?.target ?? firstGoal?.amt ?? firstGoal?.lim ?? 0) || 0;
      const goalSaved = Number(firstGoal?.saved ?? firstGoal?.current ?? 0) || 0;
      const goalProgress = goalTarget > 0 ? Math.max(0, Math.min(100, (goalSaved / goalTarget) * 100)) : 0;
      const goalLeft = Math.max(goalTarget - goalSaved, 0);

      const monthlyIncome = Number(t.income || 0) > 0
        ? Number(t.income || 0)
        : Number((qq?.segment === "student" ? qq?.monthlyAllowance : qq?.monthlyIncome) || d?.income || 0);
      const monthlyFixed = Number(qq?.fixedExpenses || 0);
      const monthlyDebt = Number(qq?.segment === "student" ? qq?.educationLoanEmi : qq?.monthlyDebtPayment) || 0;
      const monthlyCommitted = Math.max(monthlyFixed + monthlyDebt, 0);
      const monthlyFree = Math.max(monthlyIncome - monthlyCommitted, 0);
      const financeKeywords = ["money", "finance", "financial", "budget", "expense", "spend", "saving", "savings", "invest", "stock", "mutual", "fund", "sip", "etf", "loan", "debt", "emi", "income", "net worth", "asset", "liability", "subscription", "credit", "interest", "tax", "portfolio", "insurance", "retirement", "emergency fund", "goal", "goals", "target", "plan", "milestone", "month", "week", "doing", "status", "summary", "health"];
      const financeIntent = financeKeywords.some((k) => m.includes(k));
      const conceptTopic = (() => {
        if (has("stock market", "stockmarket", "share market", "equity market")) return "stock_market";
        if (has("mutual fund", "mutualfund", "mf")) return "mutual_fund";
        if (has("sip", "systematic investment plan")) return "sip";
        if (has("etf")) return "etf";
        if (has("emi")) return "emi";
        if (has("credit score", "cibil")) return "credit_score";
        if (has("inflation")) return "inflation";
        if (has("compound interest", "compounding")) return "compounding";
        if (has("emergency fund")) return "emergency_fund";
        if (has("net worth")) return "net_worth";
        if (has("budgeting", "budget")) return "budgeting";
        return null;
      })();

      const out = [];

      if (has("whatismyname", "what'smyname", "whatsmyname", "myname", "mynam", "mynme", "whoami")) {
        out.push(`Your profile name is ${userName}.`);
        if (qq?.segment) out.push(`Profile type: ${String(qq.segment).replace(/_/g, " ")}.`);
        if (qq?.primaryGoal) out.push(`Primary goal: ${String(qq.primaryGoal).replace(/_/g, " ")}.`);
        out.push("Ask for a weekly plan, loan strategy, overspending check, or investing split and I will calculate it from your data.");
      } else if (marketCompareIntent) {
        out.push("Neither is always more profitable globally; it depends on time horizon, interest rates, valuation, location, and risk.");
        out.push("Stocks are usually more liquid and diversified with stronger long-term growth potential, but can be volatile in the short term.");
        out.push("Property can offer rental income and leverage, but needs high capital, has lower liquidity, and comes with maintenance and location risk.");
        out.push("In uncertain economic periods, a diversified mix is usually safer than all-in on one asset.");
        if (monthlyFree > 0) out.push(`With current free cash around ${formatMoneyInline(monthlyFree)} per month, start diversified and add property later after emergency fund and down payment readiness.`);
        out.push("Share your timeline and risk comfort, and I can suggest an exact split.");
      } else if (investmentAdviceIntent) {
        if (monthlyFree > 0) out.push(`With your estimated free monthly cashflow of ${formatMoneyInline(monthlyFree)}, a balanced, low-cost approach is safest.`);
        out.push("For beginners with smaller starting amounts (like ₹100), direct stock picking carries high volatility and brokerage fees can easily erase your margins.");
        out.push("Instead, consider starting with low-cost Broad-Market Index Mutual Funds or ETFs using SIPs (Systematic Investment Plans) for immediate diversification without the hassle of stock-picking.");
        out.push("Early on, focus purely on building the habit of consistent investing rather than trying to time the market, while ensuring you keep an emergency fund safely in the bank.");
      } else if (conceptIntent && conceptTopic) {
        const explain = {
          stock_market: "Stock market is a place where investors buy and sell company ownership shares. If company value grows, share prices may rise, and some companies pay dividends.",
          mutual_fund: "A mutual fund pools money from many investors and is managed by professionals across stocks, bonds, or other assets for diversification.",
          sip: "SIP means investing a fixed amount regularly, like every month, into a mutual fund. It builds discipline and lowers timing risk.",
          etf: "ETF is a basket of securities that trades like a stock. It usually tracks an index, offering low-cost diversification.",
          emi: "EMI is your fixed monthly loan payment covering both principal and interest. Early EMIs are mostly interest; later ones pay more principal.",
          credit_score: "Credit score represents credit risk based on repayment history. A higher score improves loan approval chances and interest rates.",
          inflation: "Inflation is the general rise in prices over time. Simply put, it means money buys less in the future.",
          compounding: "Compounding is earning returns on both your initial investment and past returns. Over long periods, it creates exponential growth.",
          emergency_fund: "An emergency fund is liquid cash meant for crises like job loss or medical events, usually 3-6 months of essential expenses.",
          net_worth: "Net worth is total assets minus total liabilities. It is the clearest marker of your true financial health.",
          budgeting: "Budgeting is planning where your incoming money should go so you hit savings and spending goals."
        };
        out.push(explain[conceptTopic]);
        if (conceptTopic === "stock_market") out.push("Simple start: keep emergency fund ready first, then begin with diversified funds/ETFs and gradual investing.");
        out.push("If you want, I can now connect this to your profile and give a practical step-by-step plan.");
      } else if (conceptIntent && !conceptTopic) {
        out.push("I can answer general questions too. Ask clearly in one line like: what is machine learning, who is Alan Turing, or explain black holes.");
      } else if (!financeIntent) {
        if (has("joke")) out.push("Here is one: Why did the spreadsheet go to therapy? Too many unresolved issues.");
        else if (greeting) out.push(`Hi ${s(userName)}. Ask me any question and I will answer directly.`);
        else if (has("weather", "temperature", "rain", "forecast")) out.push("For weather, share your city and I will help with a practical real-time check.");
        else out.push("I can answer this. Ask with a bit more detail, and I will give a precise response.");
      } else if (has("weekly", "weekplan", "weeklysaving", "weeklybudget")) {
        const weeklyIncome = Math.round((monthlyIncome / 4.33) * 100) / 100;
        const weeklyCommitted = Math.round((monthlyCommitted / 4.33) * 100) / 100;
        if (qq?.segment === "student") {
          const weeklyNeeds = weeklyCommitted;
          if (weeklyNeeds >= weeklyIncome) {
            const weeklyDeficit = Math.round((weeklyNeeds - weeklyIncome) * 100) / 100;
            out.push(`Weekly student plan: allowance/income ${formatMoneyInline(weeklyIncome)}, essential needs+EMI ${formatMoneyInline(weeklyNeeds)}, deficit ${formatMoneyInline(weeklyDeficit)}.`);
            out.push("For this week, pause non-essential spending, trim living costs, and prioritize covering essentials first.");
          } else {
            const remaining = Math.round((weeklyIncome - weeklyNeeds) * 100) / 100;
            const weeklyStudy = Math.round((remaining * 0.3) * 100) / 100;
            const weeklyPersonal = Math.round((remaining * 0.3) * 100) / 100;
            const weeklySavings = Math.round((Math.max(remaining - weeklyStudy - weeklyPersonal, 0)) * 100) / 100;
            out.push(`Weekly student plan: allowance/income ${formatMoneyInline(weeklyIncome)}, needs+EMI ${formatMoneyInline(weeklyNeeds)}, study ${formatMoneyInline(weeklyStudy)}, personal ${formatMoneyInline(weeklyPersonal)}, savings ${formatMoneyInline(weeklySavings)}.`);
            out.push("Use separate wallets for needs, study, and personal spends, and move unspent personal money to savings each week.");
          }
        } else {
          if (weeklyCommitted >= weeklyIncome) {
            const weeklyDeficit = Math.round((weeklyCommitted - weeklyIncome) * 100) / 100;
            out.push(`Weekly plan: income ${formatMoneyInline(weeklyIncome)}, committed bills+debt ${formatMoneyInline(weeklyCommitted)}, deficit ${formatMoneyInline(weeklyDeficit)}.`);
            out.push("Reduce optional spend and renegotiate fixed outflows to remove the weekly deficit before setting new savings targets.");
          } else {
            const maxSave = Math.round((weeklyIncome - weeklyCommitted) * 100) / 100;
            const weeklySavingsTargetRaw = Math.max((monthlyIncome * 0.2) / 4.33, 0);
            const weeklySavingsTarget = Math.round((Math.min(weeklySavingsTargetRaw, maxSave)) * 100) / 100;
            const weeklyFlexible = Math.round((Math.max(maxSave - weeklySavingsTarget, 0)) * 100) / 100;
            out.push(`Weekly plan: income ${formatMoneyInline(weeklyIncome)}, committed bills+debt ${formatMoneyInline(weeklyCommitted)}, savings target ${formatMoneyInline(weeklySavingsTarget)}, flexible spend ${formatMoneyInline(weeklyFlexible)}.`);
            out.push("Review every Sunday and move unused flexible money into savings.");
          }
        }
      } else if (has("month", "doing", "status", "summary", "health")) {
        out.push(`This month: income ${formatMoneyInline(t.income)}, spend ${formatMoneyInline(t.spent)}, saved ${formatMoneyInline(t.saved)}, savings rate ${s(t.rate)}%.`);
        if (monthlySubs > 0) out.push(`Active subscriptions cost about ${formatMoneyInline(monthlySubs)} per month.`);
        if (over.length > 0) out.push(`You are over budget in ${over[0].cat} by ${formatMoneyInline(over[0].overBy)}.`);
        else out.push("You are currently within your tracked budget categories.");
        out.push(`Loans paid ${formatMoneyInline(totalLoanPaid)} and loans left ${formatMoneyInline(totalLiabilities)}.`);
      } else if (has("subscription", "subscriptions", "recurring", "renew", "renewal", "cancel", "ott", "netflix", "spotify", "prime")) {
        if (subscriptions.length === 0) {
          out.push("You have no active subscriptions tracked yet. Add them in the Subscriptions page and I will optimize renewals and cancellations.");
        } else {
          out.push(`You have ${subscriptions.length} active subscriptions costing about ${formatMoneyInline(monthlySubs)} per month (${formatMoneyInline(monthlySubs * 12)} yearly).`);
          if (topSubs.length) {
            const topLine = topSubs.slice(0, 2).map((x) => `${s(x.name)} (${formatMoneyInline(x.monthly)}/mo)`).join(", ");
            out.push(`Highest-cost subscriptions: ${topLine}.`);
          }
          if (nextSubDue && nextSubDue.nextBillingDate) out.push(`Next renewal: ${s(nextSubDue.name)} on ${s(nextSubDue.nextBillingDate)}.`);
          if (monthlyIncome > 0) {
            const subShare = (monthlySubs / monthlyIncome) * 100;
            if (subShare > 12) out.push(`Subscriptions are ${subShare.toFixed(1)}% of monthly income, which is high. Consider pausing one non-essential plan this month.`);
            else out.push(`Subscriptions are ${subShare.toFixed(1)}% of monthly income. Keep only services used weekly and remove low-usage renewals.`);
          } else {
            out.push("Prioritize keeping only high-use subscriptions and pause duplicate services.");
          }
        }
      } else if (has("budget", "spend", "expense", "overspend")) {
        if (over.length > 0) {
          const topOvers = over.slice(0, 2).map((x) => `${x.cat} (+${formatMoneyInline(x.overBy)})`).join(", ");
          out.push(`Over-budget categories: ${topOvers}.`);
        } else if (topBudget) {
          out.push(`Top spend category is ${topBudget.cat} at ${formatMoneyInline(topBudget.spent)}.`);
        } else {
          out.push("I do not have category budgets yet, so add category limits for overspending alerts.");
        }
        out.push("Action: cap optional categories and review weekly with a hard limit.");
      } else if (has("goalcheck", "goal", "target", "ontrack", "milestone")) {
        if (goalTarget > 0) {
          out.push(`Goal check: ${firstGoal?.name || "Goal"} is ${goalProgress.toFixed(1)}% complete (${formatMoneyInline(goalSaved)} of ${formatMoneyInline(goalTarget)}).`);
          out.push(`Remaining amount is ${formatMoneyInline(goalLeft)}.`);
          if (monthlyFree > 0) out.push(`You can allocate up to ${formatMoneyInline(monthlyFree)} monthly free cash to speed this up.`);
        } else if (qq?.primaryGoal) {
          out.push(`Primary goal is ${String(qq.primaryGoal).replace(/_/g, " ")}. Add a numeric target in Goals to track progress.`);
        } else {
          out.push("No numeric goal is tracked yet. Add one and I can run exact progress checks.");
        }
      } else if (has("save", "saving", "savings", "save more")) {
        const targetSave = Math.max(monthlyIncome * 0.2, 0);
        const currentSave = Math.max(Number(t.saved || 0), 0);
        const gap = Math.max(targetSave - currentSave, 0);
        out.push(`Current monthly savings is ${formatMoneyInline(currentSave)} with savings rate ${s(t.rate)}%.`);
        out.push(`A practical target is ${formatMoneyInline(targetSave)} per month (20% of income).`);
        if (gap > 0) out.push(`You need about ${formatMoneyInline(gap)} more monthly surplus. Cut optional categories first and automate savings on income day.`);
        else out.push("You are already at or above this target. Keep auto-saving and review monthly.");
      } else if (has("loan", "debt", "emi", "liability")) {
        out.push(`Total loan repaid is ${formatMoneyInline(totalLoanPaid)}; remaining is ${formatMoneyInline(totalLiabilities)}.`);
        if (topLoan) out.push(`Largest loan is ${s(topLoan.name)} (${formatMoneyInline(topLoan.left)} left, ${formatMoneyInline(topLoan.paid)} paid${topLoan.linked ? `, linked to ${s(topLoan.linked)}` : ""}${topLoan.lender ? `, lender ${s(topLoan.lender)}` : ""}${topLoan.rate > 0 ? `, ${s(topLoan.rate)}% interest` : ""}).`);
        out.push("Prioritize prepayment on highest-interest debt first after keeping emergency cash.");
      } else if (has("asset", "net worth", "stock", "mutual", "gold", "portfolio", "invest")) {
        out.push(`Assets ${formatMoneyInline(totalAssets)}, liabilities ${formatMoneyInline(totalLiabilities)}, net worth ${formatMoneyInline(netWorth)}.`);
        if (totalLiabilities > totalAssets) out.push("Since liabilities exceed assets, focus debt reduction before increasing high-risk investing.");
        else out.push("Maintain diversification across multiple asset types and review monthly.");
      } else if (has("emergency", "reserve", "rainyday")) {
        const monthlyNeed = Math.max(monthlyFixed, Number(t.spent || 0));
        const emergencyTarget = monthlyNeed * 6;
        out.push(`A 6-month emergency target is about ${formatMoneyInline(emergencyTarget)} based on monthly need ${formatMoneyInline(monthlyNeed)}.`);
        out.push("Build this in a safe and liquid account before higher-risk investing.");
      } else if (has("afford", "buy", "purchase", "cani")) {
        out.push(`Current monthly free cash is about ${formatMoneyInline(monthlyFree)}.`);
        out.push("Keep emergency fund intact and keep new EMI within a manageable share of monthly income.");
        out.push("Share the purchase price and timeline for an exact affordability plan.");
      } else if (has("student", "allowance", "college", "semester")) {
        out.push("Student plan: keep education-loan EMI separate, then split allowance weekly into needs, study, and personal spend.");
      } else if (greeting) {
        out.push(`Hi ${s(userName)}. Ask me about finance or any general topic, and I will answer directly.`);
      } else {
        out.push("I can answer general questions and finance questions.");
        out.push("Try asking: what is inflation, where am I overspending, which subscriptions should I cancel, or how much loan is left.");
      }

      if (conceptIntent || marketCompareIntent || !financeIntent || investmentAdviceIntent) {
        return out.join(" ");
      }

      if (qq?.primaryGoal && !has("goal", "target")) out.push(`Primary goal on record: ${String(qq.primaryGoal).replace(/_/g, " ")}.`);
      if (qq?.currentConcern && !has("concern", "problem")) out.push(`Noted concern: ${qq.currentConcern}.`);
      out.push("Share an exact target amount and timeline, and I will generate a precise month-by-month plan.");
      return out.join(" ");
    }

    async function fetchWikiSummary(message) {
      let topic = String(message || "").trim().replace(/[?]+$/g, "");
      const prefixes = [/^what\s+is\s+/i, /^what'?s\s+/i, /^whats\s+/i, /^who\s+is\s+/i, /^who\s+was\s+/i, /^define\s+/i, /^meaning\s+of\s+/i, /^explain\s+/i, /^tell\s+me\s+about\s+/i, /^how\s+does\s+/i, /^how\s+do\s+/i];
      for (const p of prefixes) { topic = topic.replace(p, ""); }
      topic = topic.replace(/\bfor me\b/ig, "").replace(/[^\w\s\-.'"]/g, " ").replace(/\s+/g, " ").trim();
      if (!topic || topic.length < 2) return null;

      try {
        const searchRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(topic)}&format=json&origin=*`);
        if (!searchRes.ok) return null;
        const searchJson = await searchRes.json();
        const firstTitle = searchJson?.query?.search?.[0]?.title;
        if (!firstTitle) return null;

        const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(String(firstTitle).replace(/\s+/g, "_"))}`);
        if (!res.ok) return null;
        const data = await res.json();
        let summary = data?.extract || "";
        if (summary.length > 400) summary = summary.slice(0, 400).trim() + "...";
        return summary || null;
      } catch (e) {
        return null;
      }
    }

    async function getR(message) {
      busy = true;
      typing(true);
      const d = data();
      const t = totals();
      try {
        const payload = {
          message,
          history: historyForRequest(message),
          profile: {
            name: d.name || "User",
            income_target: Number(d.income || 0),
            totals: { income: Number(t.income || 0), spent: Number(t.spent || 0), saved: Number(t.saved || 0), rate: Number(t.rate || 0) },
            txs: Array.isArray(d.txs) ? d.txs.slice(0, 80) : [],
            budgets: Array.isArray(d.budgets) ? d.budgets : [],
            goals: Array.isArray(d.goals) ? d.goals : [],
            subscriptions: Array.isArray(d.subscriptions) ? d.subscriptions : [],
            wealth: d.wealth || { assets: [], liabilities: [] },
            currency: d?.appearance?.currency || "INR",
            questionnaire: q()
          }
        };
        const r = await fetch("/api/flowai", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        if (r.ok) {
          const j = await r.json();
          const reply = (j.reply || "").trim();
          if (reply) {
            typing(false);
            remember("assistant", reply);
            addAI(s(reply).replace(/\n\n/g, "<br><br>").replace(/\n/g, "<br>"));
            busy = false;
            return;
          }
        }
      } catch (e) { console.error("FlowAI backend unavailable, relying on local AI."); }

      await new Promise((res) => setTimeout(res, 500));

      let fallback = clientFinanceFallback(message, d, t, q());

      // If the fallback is just generic placeholder text, try to fetch a short clear answer from Wiki
      if (fallback.includes("I can answer this. Ask with a bit more detail") || fallback.includes("I can answer general questions and finance questions")) {
        const wikiRes = await fetchWikiSummary(message);
        if (wikiRes) {
          fallback = wikiRes + "\n\n(I can connect these concepts to your personal finances if you'd like!)";
        } else {
          fallback = "I don't have enough data to precisely answer that. Could you ask differently, or focus on your personal finances (like budget, goals, subscriptions)?";
        }
      }

      typing(false);
      remember("assistant", fallback);
      addAI(s(fallback).replace(/\n\n/g, "<br><br>").replace(/\n/g, "<br>"));
      busy = false;
    }

    renderAll();
  </script>
