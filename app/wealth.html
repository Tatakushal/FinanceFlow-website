<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Wealth - Finance Flow</title>
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>
<div class="topbar">
  <a href="../index.html" class="tb-logo"><div class="tb-logo-icon">&#9889;</div><div class="tb-logo-text">Finance<span>Flow</span></div></a>
  <div class="tb-right"><a href="ai-chat.html" class="btn-tb-primary">Ask FlowAI</a></div>
</div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content page-in">
    <div class="page-header">
      <div class="page-title">Wealth and Portfolio</div>
      <div class="page-sub">Track assets, loans, stocks, mutual funds, gold, and total net worth.</div>
    </div>

    <div class="grid-4" style="margin-bottom:22px;">
      <div class="card-sm" style="text-align:center;">
        <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;">Total Assets</div>
        <div id="w-assets" style="font-family:var(--fd);font-size:28px;font-weight:800;color:var(--primary);">0</div>
      </div>
      <div class="card-sm" style="text-align:center;">
        <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;">Loans Left</div>
        <div id="w-liab" style="font-family:var(--fd);font-size:28px;font-weight:800;color:var(--warn);">0</div>
      </div>
      <div class="card-sm" style="text-align:center;">
        <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;">Loans Paid</div>
        <div id="w-paid" style="font-family:var(--fd);font-size:28px;font-weight:800;color:var(--primary);">0</div>
      </div>
      <div class="card-sm" style="text-align:center;">
        <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;">Net Worth</div>
        <div id="w-net" style="font-family:var(--fd);font-size:28px;font-weight:800;color:var(--accent);">0</div>
      </div>
    </div>

    <div class="grid-2" style="gap:20px;margin-bottom:22px;">
      <div class="card">
        <div style="font-family:var(--fd);font-size:18px;font-weight:800;color:#fff;margin-bottom:14px;">Add Asset</div>
        <div class="form-row">
          <div class="fw"><label class="flbl">Asset Name</label><input class="finput" id="a-name" placeholder="Example: SBI Stock, Gold Coins"></div>
          <div class="fw"><label class="flbl">Type</label>
            <select class="finput" id="a-type">
              <option>Stocks</option>
              <option>Mutual Funds</option>
              <option>Gold</option>
              <option>Cash</option>
              <option>Property</option>
              <option>Crypto</option>
              <option>Fixed Deposit</option>
              <option>Bonds</option>
              <option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="fw"><label class="flbl">Current Value</label><input class="finput" id="a-value" type="number" min="0" placeholder="0"></div>
          <div class="fw"><label class="flbl">Quantity (optional)</label><input class="finput" id="a-qty" type="number" min="0" step="0.0001" placeholder="0"></div>
        </div>
        <div class="fw"><label class="flbl">Notes (optional)</label><input class="finput" id="a-note" placeholder="Example: Long term holding"></div>
        <button class="btn btn-p btn-full" onclick="addAsset()">Add Asset</button>
      </div>

      <div class="card">
        <div style="font-family:var(--fd);font-size:18px;font-weight:800;color:#fff;margin-bottom:14px;">Add Liability</div>
        <div class="form-row">
          <div class="fw"><label class="flbl">Liability Name</label><input class="finput" id="l-name" placeholder="Example: Education Loan"></div>
          <div class="fw"><label class="flbl">Type</label>
            <select class="finput" id="l-type">
              <option>Home Loan</option>
              <option>Personal Loan</option>
              <option>Education Loan</option>
              <option>Car Loan</option>
              <option>Credit Card Due</option>
              <option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="fw"><label class="flbl">Linked Home / Asset</label><input class="finput" id="l-linked" placeholder="Example: 2BHK Flat - Pune"></div>
          <div class="fw"><label class="flbl">Lender / Bank</label><input class="finput" id="l-lender" placeholder="Example: HDFC Bank"></div>
        </div>
        <div class="form-row">
          <div class="fw"><label class="flbl">Original Loan Amount</label><input class="finput" id="l-original" type="number" min="0" placeholder="0"></div>
          <div class="fw"><label class="flbl">Outstanding Amount (left)</label><input class="finput" id="l-outstanding" type="number" min="0" placeholder="0"></div>
        </div>
        <div class="form-row">
          <div class="fw"><label class="flbl">EMI (optional)</label><input class="finput" id="l-emi" type="number" min="0" placeholder="0"></div>
          <div class="fw"><label class="flbl">Interest % (optional)</label><input class="finput" id="l-rate" type="number" min="0" step="0.01" placeholder="0"></div>
        </div>
        <div class="form-row">
          <div class="fw"><label class="flbl">Start Date (optional)</label><input class="finput" id="l-start" type="date"></div>
          <div class="fw"><label class="flbl">Tenure (months, optional)</label><input class="finput" id="l-tenure" type="number" min="0" placeholder="0"></div>
        </div>
        <div class="fw"><label class="flbl">Notes (optional)</label><input class="finput" id="l-note" placeholder="Example: Prepay in 18 months"></div>
        <button class="btn btn-p btn-full" onclick="addLiability()">Add Liability</button>
      </div>
    </div>

    <div class="grid-2" style="gap:20px;">
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="padding:16px 18px;border-bottom:1px solid var(--border);font-family:var(--fd);font-size:16px;font-weight:800;">Assets</div>
        <div id="assets-list"></div>
      </div>
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="padding:16px 18px;border-bottom:1px solid var(--border);font-family:var(--fd);font-size:16px;font-weight:800;">Liabilities</div>
        <div id="liabilities-list"></div>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="ff-toast"></div>

<script src="../js/app.js"></script>
<script>
if (!FF.isLoggedIn()) location.href = 'signin.html';
FF.initializeAppearance();
buildSidebar('wealth');

function ensureWealthData() {
  const d = FF.data;
  if (!d.wealth || typeof d.wealth !== 'object') d.wealth = { assets: [], liabilities: [] };
  if (!Array.isArray(d.wealth.assets)) d.wealth.assets = [];
  if (!Array.isArray(d.wealth.liabilities)) d.wealth.liabilities = [];
  FF.save(d);
}

function esc(v) {
  return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toNum(v) {
  const n = Number(v);
  return Number.isFinite(n) && n >= 0 ? n : 0;
}

function resetAssetForm() {
  document.getElementById('a-name').value = '';
  document.getElementById('a-value').value = '';
  document.getElementById('a-qty').value = '';
  document.getElementById('a-note').value = '';
}

function resetLiabilityForm() {
  document.getElementById('l-name').value = '';
  document.getElementById('l-linked').value = '';
  document.getElementById('l-lender').value = '';
  document.getElementById('l-original').value = '';
  document.getElementById('l-outstanding').value = '';
  document.getElementById('l-emi').value = '';
  document.getElementById('l-rate').value = '';
  document.getElementById('l-start').value = '';
  document.getElementById('l-tenure').value = '';
  document.getElementById('l-note').value = '';
}

function addAsset() {
  const name = document.getElementById('a-name').value.trim();
  const type = document.getElementById('a-type').value;
  const value = toNum(document.getElementById('a-value').value);
  const quantity = toNum(document.getElementById('a-qty').value);
  const note = document.getElementById('a-note').value.trim();

  if (!name || value <= 0) { toast('Enter asset name and value.'); return; }

  const d = FF.data;
  d.wealth.assets.unshift({
    id: Date.now() + Math.floor(Math.random() * 1000),
    name, type, value, quantity, note,
    createdAt: new Date().toISOString()
  });
  FF.save(d);
  resetAssetForm();
  renderAll();
  toast('Asset added.');
}

function addLiability() {
  const name = document.getElementById('l-name').value.trim();
  const type = document.getElementById('l-type').value;
  const linkedTo = document.getElementById('l-linked').value.trim();
  const lender = document.getElementById('l-lender').value.trim();
  const originalAmount = toNum(document.getElementById('l-original').value);
  const outstandingAmount = toNum(document.getElementById('l-outstanding').value);
  const emi = toNum(document.getElementById('l-emi').value);
  const rate = toNum(document.getElementById('l-rate').value);
  const startDate = document.getElementById('l-start').value || '';
  const tenureMonths = toNum(document.getElementById('l-tenure').value);
  const note = document.getElementById('l-note').value.trim();

  if (!name || originalAmount <= 0) { toast('Enter liability name and original loan amount.'); return; }
  if (outstandingAmount > originalAmount) { toast('Outstanding amount cannot be more than original amount.'); return; }
  const paidAmount = Math.max(originalAmount - outstandingAmount, 0);

  const d = FF.data;
  d.wealth.liabilities.unshift({
    id: Date.now() + Math.floor(Math.random() * 1000),
    name,
    type,
    linkedTo,
    lender,
    originalAmount,
    outstandingAmount,
    paidAmount,
    amount: outstandingAmount,
    emi,
    rate,
    startDate,
    tenureMonths,
    note,
    createdAt: new Date().toISOString()
  });
  FF.save(d);
  resetLiabilityForm();
  renderAll();
  toast('Liability added.');
}

function delAsset(id) {
  const d = FF.data;
  d.wealth.assets = d.wealth.assets.filter((a) => Number(a.id) !== Number(id));
  FF.save(d);
  renderAll();
}

function delLiability(id) {
  const d = FF.data;
  d.wealth.liabilities = d.wealth.liabilities.filter((l) => Number(l.id) !== Number(id));
  FF.save(d);
  renderAll();
}

function renderSummary() {
  const nw = FF.getNetWorth();
  const paidTotal = FF.data.wealth.liabilities.reduce((sum, loan) => sum + normalizeLoan(loan).paidAmount, 0);
  document.getElementById('w-assets').textContent = FF.fmt(nw.assets);
  document.getElementById('w-liab').textContent = FF.fmt(nw.liabilities);
  document.getElementById('w-paid').textContent = FF.fmt(paidTotal);
  document.getElementById('w-net').textContent = FF.fmt(nw.net);
}

function renderAssets() {
  const assets = FF.data.wealth.assets;
  const el = document.getElementById('assets-list');
  if (!assets.length) {
    el.innerHTML = '<div style="padding:28px;color:var(--text-muted);text-align:center;">No assets added yet.</div>';
    return;
  }
  el.innerHTML = `<div class="table-scroll"><table class="data-table"><thead><tr><th>Name</th><th>Type</th><th style="text-align:right;">Value</th><th></th></tr></thead><tbody>${
    assets.map((a) => `<tr>
      <td><div style="font-weight:600;color:#fff;">${esc(a.name)}</div>${a.note ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${esc(a.note)}</div>` : ''}</td>
      <td style="color:var(--text-muted);">${esc(a.type)}</td>
      <td style="text-align:right;font-weight:800;color:var(--primary);">${FF.fmt(Number(a.value) || 0)}</td>
      <td style="text-align:right;"><button class="btn btn-s" style="padding:6px 10px;font-size:11px;" onclick="delAsset(${Number(a.id)})">Remove</button></td>
    </tr>`).join('')
  }</tbody></table></div>`;
}

function normalizeLoan(loan) {
  const outstanding = toNum(loan?.outstandingAmount ?? loan?.amount ?? 0);
  const original = toNum(loan?.originalAmount ?? outstanding);
  const paid = toNum(loan?.paidAmount ?? Math.max(original - outstanding, 0));
  const progress = original > 0 ? Math.min(100, Math.round((paid / original) * 100)) : 0;
  return {
    name: String(loan?.name || 'Loan'),
    type: String(loan?.type || 'Other'),
    linkedTo: String(loan?.linkedTo || ''),
    lender: String(loan?.lender || ''),
    originalAmount: original,
    outstandingAmount: outstanding,
    paidAmount: paid,
    emi: toNum(loan?.emi),
    rate: toNum(loan?.rate),
    startDate: String(loan?.startDate || ''),
    tenureMonths: toNum(loan?.tenureMonths),
    note: String(loan?.note || ''),
    progress
  };
}

function renderLiabilities() {
  const liabilities = FF.data.wealth.liabilities;
  const el = document.getElementById('liabilities-list');
  if (!liabilities.length) {
    el.innerHTML = '<div style="padding:28px;color:var(--text-muted);text-align:center;">No liabilities added yet.</div>';
    return;
  }
  el.innerHTML = `<div class="table-scroll"><table class="data-table"><thead><tr><th>Loan</th><th>Linked Asset</th><th style="text-align:right;">Paid</th><th style="text-align:right;">Left</th><th style="text-align:right;">EMI</th><th></th></tr></thead><tbody>${
    liabilities.map((raw) => {
      const l = normalizeLoan(raw);
      return `<tr>
      <td>
        <div style="font-weight:700;color:#fff;">${esc(l.name)}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${esc(l.type)}${l.lender ? ` · ${esc(l.lender)}` : ''}</div>
        <div style="margin-top:8px;">
          <div class="pbar-sm"><div class="pfill-sm" style="width:${l.progress}%;background:linear-gradient(90deg,var(--primary),var(--accent));"></div></div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${l.progress}% repaid · Original ${FF.fmt(l.originalAmount)}</div>
        </div>
      </td>
      <td style="color:var(--text-muted);">
        <div>${l.linkedTo ? esc(l.linkedTo) : '-'}</div>
        <div style="font-size:11px;margin-top:4px;">${l.startDate ? `Start: ${esc(l.startDate)}` : ''}${l.tenureMonths ? ` ${l.startDate ? '·' : ''} Tenure: ${l.tenureMonths}m` : ''}</div>
      </td>
      <td style="text-align:right;font-weight:800;color:var(--primary);">${FF.fmt(l.paidAmount)}</td>
      <td style="text-align:right;font-weight:800;color:var(--warn);">${FF.fmt(l.outstandingAmount)}</td>
      <td style="text-align:right;color:var(--text-muted);">${l.emi > 0 ? FF.fmt(l.emi) : '-'}</td>
      <td style="text-align:right;"><button class="btn btn-s" style="padding:6px 10px;font-size:11px;" onclick="delLiability(${Number(raw.id)})">Remove</button></td>
    </tr>`;
    }).join('')
  }</tbody></table></div>`;
}

function renderAll() {
  renderSummary();
  renderAssets();
  renderLiabilities();
}

ensureWealthData();
renderAll();
</script>
</body>
</html>
