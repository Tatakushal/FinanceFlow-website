<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Goals — Finance Flow</title><link rel="stylesheet" href="../css/app.css"></head>
<body>
<div class="topbar">
  <a href="../index.html" class="tb-logo"><div class="tb-logo-icon">⚡</div><div class="tb-logo-text">Finance<span>Flow</span></div></a>
  <div class="tb-right"><button class="btn-tb-primary" onclick="showAdd()">＋ New Goal</button></div>
</div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content page-in">
    <div class="page-header"><div class="page-title">Goals 🎯</div><div class="page-sub">Track your financial dreams</div></div>

    <!-- Add form -->
    <div id="add-form" style="display:none;" class="card" style="margin-bottom:28px;">
      <div style="font-family:var(--fd);font-size:18px;font-weight:800;color:#fff;margin-bottom:20px;">Create New Goal</div>
      <div class="form-row">
        <div class="fw"><label class="flbl">Goal Name</label><input class="finput" id="g-name" placeholder="e.g. Emergency Fund, New Car"></div>
        <div class="fw"><label class="flbl">Emoji</label><input class="finput" id="g-emoji" placeholder="🎯" maxlength="2" style="font-size:24px;"></div>
      </div>
      <div class="form-row">
        <div class="fw"><label class="flbl">Target Amount (₹)</label><input class="finput" type="number" id="g-target" placeholder="e.g. 100000" min="1"></div>
        <div class="fw"><label class="flbl">Already Saved (₹)</label><input class="finput" type="number" id="g-saved" placeholder="0" min="0"></div>
      </div>
      <div style="display:flex;gap:12px;"><button class="btn btn-s" style="flex:1;" onclick="hideAdd()">Cancel</button><button class="btn btn-p" style="flex:2;" onclick="addGoal()">✓ Create Goal</button></div>
    </div>

    <div id="goals-list"></div>
  </main>
</div>
<div class="toast" id="ff-toast"></div>
<script src="../js/app.js"></script>
<script>
if (!FF.isLoggedIn()) location.href = 'signin.html';
FF.initializeAppearance();
buildSidebar('goals');
function render() {
  const d = FF.data;
  if (!d.goals.length) {
    document.getElementById('goals-list').innerHTML = `<div style="text-align:center;padding:80px 20px;color:var(--text-muted);"><div style="font-size:64px;margin-bottom:20px;">🎯</div><div style="font-family:var(--fd);font-size:22px;font-weight:800;color:#fff;margin-bottom:10px;">No goals yet</div><div style="font-size:15px;margin-bottom:24px;">Set a financial goal and track your progress</div><button class="btn btn-p" style="max-width:200px;margin:0 auto;" onclick="showAdd()">＋ Create First Goal</button></div>`;
    return;
  }
  document.getElementById('goals-list').innerHTML = `<div class="grid-2">${d.goals.map(g => {
    const pct = Math.min(g.saved/g.target*100,100).toFixed(0);
    const on = g.saved >= g.target*0.5;
    const col = on ? 'var(--primary)' : 'var(--warn)';
    return `<div class="goal-card" style="background:linear-gradient(135deg,${on?'rgba(0,229,160,0.06)':'rgba(255,107,53,0.06)'},rgba(61,127,255,0.03));border-color:${on?'rgba(0,229,160,0.2)':'rgba(255,107,53,0.2)'};">
      <div class="goal-hdr"><span class="goal-emoji">${g.emoji}</span><div style="flex:1;"><div class="goal-title">${g.name}</div><div class="goal-status" style="color:${col};">${pct}% complete · ${on?'On track ✓':'Needs attention'}</div></div><div style="font-family:var(--fd);font-size:20px;font-weight:800;color:${col};">${pct}%</div></div>
      <div class="pbar" style="margin-bottom:10px;"><div class="pfill" style="width:${pct}%;background:linear-gradient(90deg,${on?'var(--primary),var(--accent)':'var(--warn),var(--purple)'});"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-muted);"><span>${FF.fmt(g.saved)} saved</span><span>${FF.fmt(g.target-g.saved)} remaining</span><span>${FF.fmt(g.target)} goal</span></div>
    </div>`;
  }).join('')}</div>`;
}
function showAdd() { document.getElementById('add-form').style.display='block'; document.getElementById('add-form').scrollIntoView({behavior:'smooth'}); }
function hideAdd() { document.getElementById('add-form').style.display='none'; }
function addGoal() {
  const n=document.getElementById('g-name').value.trim(), e=document.getElementById('g-emoji').value||'🎯';
  const tgt=parseInt(document.getElementById('g-target').value), sv=parseInt(document.getElementById('g-saved').value)||0;
  if (!n||!tgt) { toast('⚠️ Enter a name and target amount'); return; }
  const d=FF.data; d.goals.push({id:Date.now(),name:n,emoji:e,saved:sv,target:tgt}); FF.save(d);
  toast('🎯 Goal "'+n+'" created!'); hideAdd(); render();
}
render();
</script>
</body></html>
