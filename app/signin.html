<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sign In — Finance Flow</title><link rel="stylesheet" href="../css/app.css"></head>
<body>
<div class="topbar">
  <a href="../index.html" class="tb-logo"><div class="tb-logo-icon">⚡</div><div class="tb-logo-text">Finance<span>Flow</span></div></a>
  <div style="font-size:14px;color:var(--text-muted);">Don't have an account? <a href="signup.html" style="color:var(--accent);font-weight:700;text-decoration:none;">Sign up free →</a></div>
</div>
<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 16px;box-shadow:0 8px 28px var(--primary-glow);">⚡</div>
      <div class="auth-title">Welcome back 👋</div>
      <div class="auth-sub">Sign in to your Finance Flow account</div>
    </div>
    <div class="fw"><label class="flbl">Email Address</label><input class="finput" type="email" id="email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="fw" style="margin-bottom:10px;"><label class="flbl">Password</label><input class="finput" type="password" id="pass" placeholder="••••••••" autocomplete="current-password"></div>
    <div style="text-align:right;margin-bottom:24px;"><a href="#" style="font-size:13px;color:var(--accent);font-weight:600;text-decoration:none;" onclick="toast('Reset link sent to your email!')">Forgot password?</a></div>
    <button class="btn btn-p btn-full" onclick="doSignIn()">Sign In →</button>
    <button class="btn btn-s btn-full" style="margin-top:12px;" onclick="restoreBackup()">Restore Backup (.json)</button>
    <div class="divider"><div class="div-line"></div><span class="div-txt">or continue with</span><div class="div-line"></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <button class="btn-social" onclick="socialLogin('Apple')">🍎 Apple</button>
      <button class="btn-social" onclick="socialLogin('Google')">🔵 Google</button>
    </div>
    <div style="text-align:center;margin-top:24px;font-size:14px;color:var(--text-muted);">No account yet? <a href="signup.html" style="color:var(--accent);font-weight:700;text-decoration:none;">Create one free</a></div>
  </div>
</div>
<div class="toast" id="ff-toast"></div>
<script src="../js/app.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const emailParam = urlParams.get('email');
const decodedEmail = emailParam ? decodeURIComponent(emailParam) : '';
const current = FF.getUser();

if (decodedEmail) {
  document.getElementById('email').value = decodedEmail;

  const curEmail = String(current?.email || '').trim().toLowerCase();
  const wanted = String(decodedEmail || '').trim().toLowerCase();
  if (curEmail && wanted && curEmail !== wanted) {
    // Switch accounts cleanly.
    FF.logout();
  } else if (curEmail && curEmail === wanted) {
    location.href = 'dashboard.html';
  }
} else if (FF.isLoggedIn()) {
  location.href = 'dashboard.html';
}

async function doSignIn() {
  const e = document.getElementById('email').value.trim();
  const p = document.getElementById('pass').value;
  if (!e) { toast('⚠️ Enter your email'); return; }
  if (!p) { toast('⚠️ Enter your password'); return; }

  const derived = (() => {
    const n = e.split('@')[0] || '';
    return n ? n.charAt(0).toUpperCase() + n.slice(1) : 'User';
  })();

  // Cloud Sync (Firebase) — if configured, sign in from cloud and sync data.
  const cloudReady = await FF.cloud?.init?.().catch(() => false);
  if (cloudReady) {
    try {
      const out = await FF.cloud.signIn(e, p);
      toast('✅ Welcome back, ' + (out?.name || derived) + '!');
      setTimeout(() => location.href = 'dashboard.html', 700);
      return;
    } catch (err) {
      const code = String(err?.code || err?.message || '').toLowerCase();
      const localExists = FF.checkAccount(e);

      // If this email exists locally but not yet in cloud, migrate it automatically.
      if (localExists && code.includes('user-not-found')) {
        const storedName = FF.getAccountNameByEmail(e);
        const name = storedName || derived;
        const local = FF.getAccountDataByEmail(e) || FF.freshData(name, e, 0);
        try {
          await FF.cloud.signUp(name, e, p, local);
          toast('✅ Cloud sync enabled for ' + name + '!');
          setTimeout(() => location.href = 'dashboard.html', 700);
          return;
        } catch (_err2) {
          // fall back to local below
        }
      }

      if (code.includes('wrong-password') || code.includes('invalid-password') || code.includes('invalid-login-credentials') || code.includes('invalid-credential')) {
        toast('Incorrect password');
        return;
      }
      if (code.includes('user-not-found')) {
        toast('No account found. Create one first.');
        setTimeout(() => location.href = 'signup.html?email=' + encodeURIComponent(e), 900);
        return;
      }
      // Any other cloud failure falls back to local.
    }
  }

  // Local-only fallback
  if (!FF.checkAccount(e)) {
    toast('No account found. Create one first.');
    setTimeout(() => location.href = 'signup.html?email=' + encodeURIComponent(e), 900);
    return;
  }

  const ok = await FF.verifyPassword(e, p, { enrollIfMissing: true });
  if (!ok) { toast('Incorrect password'); return; }

  const storedName = FF.getAccountNameByEmail(e);
  const name = storedName || derived;

  FF.login(name, e);
  toast('✅ Welcome back, ' + name + '!');
  setTimeout(() => location.href = 'dashboard.html', 700);
}
function restoreBackup() {
  const pass = document.getElementById('pass').value;
  if (!pass || pass.length < 6) {
    toast('⚠️ Enter a password (min 6) to restore');
    return;
  }

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = (ev) => {
    const file = ev.target.files?.[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async (rev) => {
      try {
        const parsed = JSON.parse(String(rev.target?.result || ''));
        const safe = FF.ensureDataShape(parsed);
        const backupEmail = String(safe?.email || '').trim();
        const typedEmail = String(document.getElementById('email').value || '').trim();

        const email = (backupEmail || typedEmail).toLowerCase();
        if (!email || !email.includes('@')) {
          toast('⚠️ Backup is missing a valid email');
          return;
        }

        if (backupEmail && typedEmail && backupEmail.toLowerCase() !== typedEmail.toLowerCase()) {
          document.getElementById('email').value = backupEmail;
          toast('ℹ️ Backup email loaded into the form');
        }

        if (FF.checkAccount(email)) {
          toast('⚠️ Account already exists on this device. Sign in instead.');
          return;
        }

        // Store backup under the per-email key BEFORE login.
        safe.email = backupEmail || typedEmail || safe.email || '';
        localStorage.setItem(`ff_data_${email}`, JSON.stringify(safe));
        await FF.setPassword(email, pass);

        const derived = (() => {
          const n = (email.split('@')[0] || '').trim();
          return n ? n.charAt(0).toUpperCase() + n.slice(1) : 'User';
        })();
        const name = String(safe?.name || '').trim() || derived;

        FF.login(name, email);
        toast('✅ Backup restored!');
        setTimeout(() => location.href = 'dashboard.html', 700);
      } catch (_err) {
        toast('⚠️ Invalid backup file');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function socialLogin(p) {
  const name = 'Demo User';
  FF.login(name, 'demo@financeflow.app');
  toast('✅ Signed in with ' + p);
  setTimeout(() => location.href = 'dashboard.html', 700);
}
document.getElementById('pass').addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
</script>
</body></html>
