<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Edit Profile — Finance Flow</title><link rel="stylesheet" href="../css/app.css"></head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar"></aside>
<div class="topbar">
  <a href="../index.html" class="tb-logo"><div class="tb-logo-icon">⚡</div><div class="tb-logo-text">Finance<span>Flow</span></div></a>
  <div class="tb-right"><a href="profile.html" class="tb-back">← Cancel</a><button class="tb-action" onclick="save()">Save Changes</button></div>
</div>
<div class="app-layout">
<main class="main-content page-in">
  <div class="page-header"><div class="page-title">Edit Profile ✏️</div></div>
  <div style="max-width:600px;">
    <div class="card" style="margin-bottom:20px;text-align:center;">
      <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--primary));margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:40px;cursor:pointer;" onclick="toast('Photo upload — coming in v2!')">😊</div>
      <div style="font-size:13px;color:var(--accent);cursor:pointer;" onclick="toast('Photo upload — coming in v2!')">Change Photo</div>
    </div>
    <div class="card">
      <div class="form-row"><div class="fw"><label class="flbl">Full Name</label><input class="finput" id="ename"></div><div class="fw"><label class="flbl">Email (read only)</label><input class="finput" id="eemail" disabled style="opacity:.5;"></div></div>
      <div class="form-row"><div class="fw"><label class="flbl">Mobile Number</label><input class="finput" id="emobile" type="tel"></div><div class="fw"><label class="flbl">Monthly Income Target (₹)</label><input class="finput" id="eincome" type="number" min="0"></div></div>
      <button class="btn btn-p btn-full" onclick="save()">💾 Save Changes</button>
    </div>
  </div>
</main></div>
<div class="toast" id="ff-toast"></div>
<script src="../js/app.js"></script>
<script>
if (!FF.isLoggedIn()) location.href = 'signin.html';
buildSidebar('profile');
const d=FF.data, u=FF.getUser();
document.getElementById('ename').value=d.name;
document.getElementById('eemail').value=d.email;
document.getElementById('emobile').value=d.mobile||'';
document.getElementById('eincome').value=d.income||0;
function save(){
  const n=document.getElementById('ename').value.trim();
  if(!n){toast('⚠️ Name cannot be empty');return;}
  const data=FF.data; data.name=n; data.mobile=document.getElementById('emobile').value; data.income=parseInt(document.getElementById('eincome').value)||0;
  FF.save(data); localStorage.setItem('ff_user',JSON.stringify({name:n,email:data.email}));
  toast('✅ Profile saved!'); setTimeout(()=>location.href='profile.html',800);
}
</script></body></html>
