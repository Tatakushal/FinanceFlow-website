[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/api/flowai"
  to = "/.netlify/functions/flowai"
  status = 200
  force = true

[[redirects]]
  from = "/features"
  to = "/pages/features.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pages/pricing.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/pages/blog.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/pages/contact.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
